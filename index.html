<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Proyeccion Empaque - Parras Valley</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0c0f07;color:#e8e0c8;font-family:system-ui;min-height:100vh;}
.hdr{background:linear-gradient(160deg,#0f1a08,#1c2e0a);border-bottom:3px solid #7a9e2a;padding:14px 16px 0;position:sticky;top:0;z-index:100;}
.hdr-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;max-width:960px;margin-left:auto;margin-right:auto;}
.logo{width:44px;height:44px;background:linear-gradient(135deg,#3a5c0a,#7a9e2a);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#d4e89a;flex-shrink:0;}
.ttl{font-size:clamp(15px,4vw,22px);font-weight:900;color:#c8d870;}
.sub{font-size:9px;color:#5a7a1a;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.sem-nav{display:flex;gap:5px;align-items:center;margin-left:auto;}
.sem-lbl{font-size:10px;color:#7a9e2a;font-weight:700;}
.nbtn{padding:4px 8px;background:rgba(122,158,42,0.08);border:1px solid rgba(122,158,42,0.2);border-radius:6px;color:#5a7a1a;font-size:11px;font-weight:700;cursor:pointer;font-family:system-ui;}
.nbtn.hoy{border-color:rgba(200,168,75,0.3);color:#c8a84b;background:rgba(200,168,75,0.08);}
.tabs{display:flex;max-width:960px;margin:0 auto;}
.tab{flex:1;padding:9px 4px;border:none;background:transparent;font-family:system-ui;font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:#3a5c0a;border-bottom:3px solid transparent;}
.tab.on{color:#c8d870;border-bottom:3px solid #7a9e2a;background:rgba(122,158,42,0.08);}
.wrap{max-width:960px;margin:0 auto;padding:16px 12px 80px;}
.sec{font-size:9px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#7a9e2a;margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(122,158,42,0.4),transparent);}
.dias{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;}
.dbtn{flex-shrink:0;padding:7px 12px;border:2px solid rgba(122,158,42,0.2);border-radius:16px;background:transparent;font-family:system-ui;font-size:11px;font-weight:800;cursor:pointer;color:#3a5c0a;}
.dbtn.on{background:linear-gradient(135deg,#3a5c0a,#7a9e2a);border-color:#7a9e2a;color:#fff;}
.card{border-radius:13px;margin-bottom:10px;overflow:hidden;border:2px solid;}
.chead{padding:11px 15px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.35);}
.cname{font-size:16px;font-weight:900;}
.csub{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:0.55;margin-top:2px;}
.cbody{padding:13px 15px;}
.ttag{display:inline-block;padding:2px 7px;border-radius:9px;font-size:8px;font-weight:900;letter-spacing:1px;margin-bottom:7px;}
.org{background:rgba(74,222,128,0.1);color:#4ade80;border:1px solid rgba(74,222,128,0.25);}
.conv{background:rgba(200,168,75,0.1);color:#c8a84b;border:1px solid rgba(200,168,75,0.25);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.f label{display:block;font-size:8px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:#5a7a1a;margin-bottom:4px;}
.inp{width:100%;border:2px solid rgba(122,158,42,0.2);border-radius:7px;padding:8px 9px;font-family:system-ui;font-size:15px;font-weight:800;background:rgba(0,0,0,0.35);color:#e8e0c8;outline:none;text-align:center;}
.inp:focus{border-color:#7a9e2a;}
.inp::placeholder{color:rgba(255,255,255,0.1);font-weight:400;font-size:12px;}
.inp.pct{color:#c8d870;} .inp.kg{color:#86c87a;} .inp.bts{color:#c8a84b;} .inp.pzs{color:#7ab8d8;}
.ssec{font-size:8px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#5a7a1a;margin:10px 0 6px;padding-bottom:3px;border-bottom:1px solid rgba(122,158,42,0.12);}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.mbox{border-radius:9px;overflow:hidden;margin-bottom:8px;}
.cpbtn{padding:9px 16px;border:2px solid rgba(122,158,42,0.35);border-radius:9px;background:rgba(122,158,42,0.08);color:#c8d870;font-family:system-ui;font-size:11px;font-weight:800;cursor:pointer;margin-right:8px;margin-bottom:10px;}
.cpbtn.amb{border-color:rgba(200,168,75,0.35);color:#c8a84b;background:rgba(200,168,75,0.08);}
/* Balance chips */
.chip{border-radius:9px;padding:9px 10px;border:1px solid;text-align:center;min-width:80px;}
.chip-l{font-size:7px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
.chip-v{font-size:18px;font-weight:900;font-family:Georgia,serif;}
.rrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px;}
/* Cruce */
.cruce{background:rgba(0,0,0,0.2);border-radius:9px;padding:10px 12px;margin-top:8px;border:1px solid rgba(122,158,42,0.2);}
.cruce-l{font-size:8px;color:#5a7a1a;font-weight:900;letter-spacing:1.5px;margin-bottom:7px;}
.cruce-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;text-align:center;}
.cruce-cell{border-radius:7px;padding:6px 4px;}
.cruce-cl{font-size:7px;font-weight:900;margin-bottom:2px;}
.cruce-cv{font-size:16px;font-weight:900;font-family:Georgia,serif;}
/* Modal */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#0c0f07;border:2px solid;border-radius:13px;padding:22px;max-width:350px;width:100%;}
.mbtn{padding:10px;border-radius:8px;font-family:system-ui;font-size:12px;font-weight:900;cursor:pointer;}
/* Bal filter */
.frow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.fbtn{padding:5px 10px;border:2px solid rgba(122,158,42,0.2);border-radius:7px;background:transparent;color:#5a7a1a;font-family:system-ui;font-size:10px;font-weight:800;cursor:pointer;}
.fbtn.on{background:rgba(122,158,42,0.15);border-color:#7a9e2a;color:#c8d870;}
/* Bal block */
.bblk{border-radius:12px;padding:13px;margin-bottom:10px;border:2px solid rgba(122,158,42,0.18);background:rgba(122,158,42,0.04);}
@media(max-width:600px){.g4{grid-template-columns:1fr 1fr;}.g3{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var uS=React.useState;
var uE=React.useEffect;
var FB_C="https://parrasvalley-default-rtdb.firebaseio.com/campo-proyeccion-v1.json";
var FB_S="https://parrasvalley-default-rtdb.firebaseio.com/campo-proy-semanas-v1.json";
var FB_A="https://parrasvalley-default-rtdb.firebaseio.com/campo-proy-ajustes-v1.json";
var FB_R="https://parrasvalley-default-rtdb.firebaseio.com/recibo-hist-v1.json";
var LS="emp-v3";
var RANCHOS=["pvt","crp","f4h"];
var RPRODS={pvt:["Persa","Slicer"],crp:["Europeo","Persa","Slicer","Morron","Minibel"],f4h:["Persa","Morron","Minibel"]};
var DIAS=["Viernes","Sabado","Domingo","Lunes","Martes","Miercoles","Jueves"];
var DIAS_C=["Viernes","Sabado","Domingo","Lunes","Martes","Miercoles","Jueves"];
var TIPOS=["org","conv"];
var CM=[{id:"rojo",l:"Rojo",c:"#ef4444"},{id:"amarillo",l:"Amarillo",c:"#eab308"},{id:"naranja",l:"Naranja",c:"#f97316"},{id:"verde",l:"Verde",c:"#22c55e"}];
var PP=[{id:"p20",l:"20 lb",kg:9.25},{id:"p8x2",l:"8x2",kg:7.60},{id:"p12x1",l:"12x1",kg:5.70}];
var GRN="#86c87a"; var AMB="#c8a84b";
function nv(v){var x=parseFloat(v);return isNaN(x)?0:x;}
function pct(v){return nv(v)/100;}
function fmt(v,d){d=d===undefined?1:d;if(!isFinite(v)||isNaN(v)||v===0)return "--";return v.toLocaleString("es-MX",{minimumFractionDigits:d,maximumFractionDigits:d});}
function fk(v){return fmt(v,1)+" kg";}
function lsL(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lsS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function getSem(){var d=new Date();var dia=d.getDay();var diff=dia>=5?dia-5:dia+2;var ini=new Date(d);ini.setDate(d.getDate()-diff);return ini.toISOString().split("T")[0];}
function addDias(f,n){var d=new Date(f+"T12:00:00");d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function numSem(f){var d=new Date(f+"T12:00:00");var dia=d.getDay();var ini=new Date(d);ini.setDate(d.getDate()-((dia+3)%7));ini.setHours(0,0,0,0);var ft=new Date(ini.getFullYear(),0,4);return Math.ceil(((ini-ft)/(86400000*7)))+1;}
function labelSem(f){var d=new Date(f+"T12:00:00");var fin=new Date(d);fin.setDate(d.getDate()+6);var m=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];return "Sem "+numSem(f)+" . "+d.getDate()+" "+m[d.getMonth()]+" al "+fin.getDate()+" "+m[fin.getMonth()];}
function initF(){var f={Persa:{fpri:"",fseg:"",fpri_c:"",fseg_c:""},Minibel:{fpri:"",fseg:"",fpri_c:"",fseg_c:""},Europeo:{pzs:"",kg:"",pp:"",ps:"",pc:"",pzs_c:"",kg_c:"",pp_c:"",ps_c:"",pc_c:""},Slicer:{pzs:"",kg:"",pp:"",ps:"",pt:"",pzs_c:"",kg_c:"",pp_c:"",ps_c:"",pt_c:""},Morron:{}};CM.forEach(function(c){TIPOS.forEach(function(t){f.Morron[c.id+"_"+t]={kg:"",ppri:"",pseg:"",pter:"",pl:"",pxl:"",pj:""};});});return f;}
function initP(){return{Persa:{},Minibel:{},Europeo:{},Slicer:{},Morron:{}};}
function initSem(){var s={fac:[],ped:[],campo:{}};for(var i=0;i<7;i++){s.fac.push(initF());s.ped.push(initP());}return s;}
function App(){
  var t1=uS("campo"); var tab=t1[0]; var setTab=t1[1];
  var t2=uS(0); var di=t2[0]; var setDi=t2[1];
  var t3=uS(function(){return lsL(LS,initSem());}); var sem=t3[0]; var setSem=t3[1];
  var t4=uS(getSem()); var semSel=t4[0]; var setSemSel=t4[1];
  var t5=uS({}); var sg=t5[0]; var setSg=t5[1];
  var t6=uS({}); var aju=t6[0]; var setAju=t6[1];
  var t7=uS([]); var recibo=t7[0]; var setRecibo=t7[1];
  var t8=uS(false); var jalC=t8[0]; var setJalC=t8[1];
  var t9=uS(false); var jalR=t9[0]; var setJalR=t9[1];
  var t10=uS(false); var mC=t10[0]; var setMC=t10[1];
  var t11=uS(false); var mR=t11[0]; var setMR=t11[1];
  var t12=uS(DIAS_C[0]); var dJC=t12[0]; var setDJC=t12[1];
  var t13=uS(new Date().toISOString().split("T")[0]); var fJR=t13[0]; var setFJR=t13[1];
  var t14=uS("todos"); var bfD=t14[0]; var setBfD=t14[1];
  var t15=uS("todos"); var bfP=t15[0]; var setBfP=t15[1];
  var t16=uS(false); var jOk=t16[0]; var setJOk=t16[1];
  var t17=uS(false); var rOk=t17[0]; var setROk=t17[1];
  var sI=semSel;
  function save(ns){setSem(ns);lsS(LS,ns);}
  function setFac(i,prod,campo,val){var ns=JSON.parse(JSON.stringify(sem));if(ns.fac[i]&&ns.fac[i][prod])ns.fac[i][prod][campo]=val;save(ns);}
  function setFM(i,cId,tipo,campo,val){var ns=JSON.parse(JSON.stringify(sem));var k=cId+"_"+tipo;if(ns.fac[i]&&ns.fac[i].Morron&&ns.fac[i].Morron[k])ns.fac[i].Morron[k][campo]=val;save(ns);}
  function setPed(i,prod,path,val){var ns=JSON.parse(JSON.stringify(sem));if(!ns.ped[i])ns.ped[i]=initP();if(!ns.ped[i][prod])ns.ped[i][prod]={};var ref=ns.ped[i][prod];var parts=path.split(".");for(var x=0;x<parts.length-1;x++){if(!ref[parts[x]])ref[parts[x]]={};ref=ref[parts[x]];}ref[parts[parts.length-1]]=val;save(ns);}
  function jalarCampo(diaLbl){
    setJalC(true);setMC(false);
    fetch(FB_C).then(function(r){return r.json();}).then(function(d){
      var ci=DIAS_C.indexOf(diaLbl);
      var ns=JSON.parse(JSON.stringify(sem));
      if(d&&typeof d==="object"){
        Object.keys(d).forEach(function(k){var pts=k.split("|");if(pts.length===3&&parseInt(pts[2])===ci)ns.campo[k]=d[k];});
      }
      save(ns);
      fetch(FB_S).then(function(r2){return r2.json();}).then(function(ds){
        if(ds&&typeof ds==="object")setSg(ds);
        fetch(FB_A).then(function(r3){return r3.json();}).then(function(da){
          if(da&&typeof da==="object")setAju(da);
          setJalC(false);setJOk(true);setTimeout(function(){setJOk(false);},3000);
        }).catch(function(){setJalC(false);});
      }).catch(function(){setJalC(false);});
    }).catch(function(){setJalC(false);});
  }
  function jalarRecibo(fIn){
    setJalR(true);setMR(false);
    var d2=new Date(fIn+"T12:00:00");
    var fRec=d2.toLocaleDateString("es-MX",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
    fetch(FB_R).then(function(r){return r.json();}).then(function(data){
      var arr=data&&Array.isArray(data)?data:(data&&typeof data==="object"?Object.keys(data).map(function(k){return data[k];}): []);
      setRecibo(arr.filter(function(h){return h&&h.fecha===fRec;}));
      setJalR(false);setROk(true);setTimeout(function(){setROk(false);},3000);
    }).catch(function(){setJalR(false);});
  }
  var mapC=[0,1,2,3,4,5,6];
  function getRej(prod,diaI,tipo){
    var totalA=0;var tA=false;
    RANCHOS.forEach(function(rid){if((RPRODS[rid]||[]).indexOf(prod)<0)return;var cl=sI+"_"+rid+"_"+diaI+"_"+prod+"_"+tipo;if(aju&&aju[cl]){tA=true;totalA+=nv(aju[cl].rejas);}});
    if(tA)return totalA;
    var totalS=0;var tS=false;
    RANCHOS.forEach(function(rid){if((RPRODS[rid]||[]).indexOf(prod)<0)return;var s2=sg&&sg[sI+"_"+rid];if(s2&&s2.dias&&s2.dias[diaI]){var dx=s2.dias[diaI];var v=nv(dx[prod]&&dx[prod][tipo]&&dx[prod][tipo].rejas||0);if(v>0){tS=true;totalS+=v;}}});
    if(tS)return totalS;
    var total=0;var ci=mapC[diaI];
    RANCHOS.forEach(function(rid){if((RPRODS[rid]||[]).indexOf(prod)<0)return;var k=sI+"|"+rid+"|"+ci;var dx=sem.campo[k];if(!dx||!dx[prod])return;total+=nv(dx[prod][tipo]&&dx[prod][tipo].rejas||0);});
    return total;
  }
  function getRejM(cId,diaI,tipo){
    var total=0;var ci=mapC[diaI];
    RANCHOS.forEach(function(rid){if((RPRODS[rid]||[]).indexOf("Morron")<0)return;var k=sI+"|"+rid+"|"+ci;var dx=sem.campo[k];if(!dx||!dx.Morron)return;var cols=(dx.Morron[tipo]&&dx.Morron[tipo].colores)||[];var ca=cols.find(function(c){return c.id===cId;});if(ca)total+=nv(ca.rejas);});
    return total;
  }
  function calcD(diaI){
    var f=sem.fac[diaI]||initF(); var res={};
    ["Persa","Minibel"].forEach(function(pr){
      var fp=f[pr]||{}; res[pr]={};
      TIPOS.forEach(function(t){var s=t==="org"?"":"_c";var rj=getRej(pr,diaI,t);res[pr][t]={rj:rj,bP:rj*nv(fp["fpri"+s]),bS:rj*nv(fp["fseg"+s]),kP:rj*nv(fp["fpri"+s])*9.25,kS:rj*nv(fp["fseg"+s])*9.25};});
    });
    var fe=f.Europeo||{}; res.Europeo={};
    TIPOS.forEach(function(t){var s=t==="org"?"":"_c";var rj=getRej("Europeo",diaI,t);var pz=rj*nv(fe["pzs"+s]);var kg=rj*nv(fe["kg"+s]);res.Europeo[t]={rj:rj,pzT:pz,kgT:kg,pzP:pz*pct(fe["pp"+s]),kgP:kg*pct(fe["pp"+s]),pzS:pz*pct(fe["ps"+s]),kgS:kg*pct(fe["ps"+s]),pzC:pz*pct(fe["pc"+s]),kgC:kg*pct(fe["pc"+s])};});
    var fs=f.Slicer||{}; res.Slicer={};
    TIPOS.forEach(function(t){var s=t==="org"?"":"_c";var rj=getRej("Slicer",diaI,t);var pz=rj*nv(fs["pzs"+s]);var kg=rj*nv(fs["kg"+s]);res.Slicer[t]={rj:rj,pzT:pz,kgT:kg,pzP:pz*pct(fs["pp"+s]),kgP:kg*pct(fs["pp"+s]),pzS:pz*pct(fs["ps"+s]),kgS:kg*pct(fs["ps"+s]),pzTer:pz*pct(fs["pt"+s]),kgTer:kg*pct(fs["pt"+s])};});
    res.Morron={};
    CM.forEach(function(col){res.Morron[col.id]={};TIPOS.forEach(function(t){var fm=(f.Morron&&f.Morron[col.id+"_"+t])||{};var rj=getRejM(col.id,diaI,t);var kT=rj*nv(fm.kg);var kP=kT*pct(fm.ppri);res.Morron[col.id][t]={rj:rj,kT:kT,kP:kP,kS:kT*pct(fm.pseg),kTer:kT*pct(fm.pter),kL:kP*pct(fm.pl),kXL:kP*pct(fm.pxl),kJ:kP*pct(fm.pj)};});});
    return res;
  }
  function acumRng(dias){
    function ac(prod){var r={};TIPOS.forEach(function(t){r[t]={};var c0=calcD(0)[prod][t];Object.keys(c0).forEach(function(k){r[t][k]=dias.reduce(function(s,dI){return s+(calcD(dI)[prod][t][k]||0);},0);});});return r;}
    function acM(cId){var r={};TIPOS.forEach(function(t){r[t]={};var c0=calcD(0).Morron[cId][t];Object.keys(c0).forEach(function(k){r[t][k]=dias.reduce(function(s,dI){return s+(calcD(dI).Morron[cId][t][k]||0);},0);});});return r;}
    return{P:ac("Persa"),Mb:ac("Minibel"),E:ac("Europeo"),S:ac("Slicer"),M:CM.reduce(function(o,col){o[col.id]=acM(col.id);return o;},{})};
  }
  function getPed(diaI,prod,path){
    var base=(sem.ped[diaI]&&sem.ped[diaI][prod])||{};
    var parts=path.split(".");var ref=base;
    for(var i=0;i<parts.length;i++){ref=ref&&ref[parts[i]];}
    return nv(ref||0);
  }
  function acPed(dias,prod,tipo,path){return dias.reduce(function(s,dI){return s+getPed(dI,prod,tipo+"."+path);},0);}
  function FI(props){
    var ls=uS(props.val||"");var loc=ls[0];var setLoc=ls[1];
    var lp=uS(props.val||"");var pv=lp[0];var setPv=lp[1];
    if(props.val!==pv){setPv(props.val||"");setLoc(props.val||"");}
    return(<div className="f" style={{marginBottom:props.mb!==undefined?props.mb:8}}><label style={{color:props.lc||"#5a7a1a"}}>{props.label}</label><input className={"inp "+(props.cls||"")} type="number" step={props.step||"0.01"} min="0" placeholder="0" value={loc} onChange={function(e){setLoc(e.target.value);}} onBlur={function(){props.set(loc);}} onKeyDown={function(e){if(e.key==="Enter")props.set(loc);}}/></div>);
  }

                {(kPP>0||c.kP>0)&&(<div className="cruce"><div className="cruce-l">1a - CRUCE KG</div>{PP.filter(function(p){var b=acPed(diasFilt,"Persa",t,"pri."+p.id)||acPed(diasFilt,"Persa",t,p.id);return b>0;}).length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:7}}>{PP.map(function(p){var b=acPed(diasFilt,"Persa",t,"pri."+p.id)||acPed(diasFilt,"Persa",t,p.id);if(!b)return null;return(<span key={p.id} style={{fontSize:10,color:AMB,background:"rgba(200,168,75,0.08)",border:"1px solid rgba(200,168,75,0.2)",borderRadius:5,padding:"2px 7px"}}>{fmt(b,0)} x {p.l} = {fk(b*p.kg)}</span>);})}</div>}<div className="cruce-g"><div className="cruce-cell"><div className="cruce-cl" style={{color:"#5a7a1a"}}>PROYECT.</div><div className="cruce-cv" style={{color:ec}}>{fk(c.kP)}</div></div><div className="cruce-cell"><div className="cruce-cl" style={{color:"#5a7a1a"}}>PEDIDO</div><div className="cruce-cv" style={{color:AMB}}>{kPP>0?fk(kPP):"--"}</div></div><div className="cruce-cell" style={{background:(c.kP-kPP)>=0?"rgba(74,222,128,0.08)":"rgba(239,68,68,0.08)",borderRadius:6}}><div className="cruce-cl" style={{color:(c.kP-kPP)>=0?"#4ade80":"#ef5350"}}>{(c.kP-kPP)>=0?"SOBRA":"FALTA"}</div><div className="cruce-cv" style={{color:(c.kP-kPP)>=0?"#4ade80":"#ef5350"}}>{fk(Math.abs(c.kP-kPP))}</div></div></div></div>)}
                {kPS>0&&(<div className="cruce"><div className="cruce-l">2a - CRUCE KG</div><div className="cruce-g"><div className="cruce-cell"><div className="cruce-cl" style={{color:"#5a7a1a"}}>PROYECT.</div><div className="cruce-cv" style={{color:GRN}}>{fk(c.kS)}</div></div><div className="cruce-cell"><div className="cruce-cl" style={{color:"#5a7a1a"}}>PEDIDO</div><div className="cruce-cv" style={{color:AMB}}>{fk(kPS)}</div></div><div className="cruce-cell" style={{background:(c.kS-kPS)>=0?"rgba(74,222,128,0.08)":"rgba(239,68,68,0.08)",borderRadius:6}}><div className="cruce-cl" style={{color:(c.kS-kPS)>=0?"#4ade80":"#ef5350"}}>{(c.kS-kPS)>=0?"SOBRA":"FALTA"}</div><div className="cruce-cv" style={{color:(c.kS-kPS)>=0?"#4ade80":"#ef5350"}}>{fk(Math.abs(c.kS-kPS))}</div></div></div></div>)}
              </div>);
            })}

            {show("Minibel")&&TIPOS.map(function(t){var c=ac.Mb[t];if(!c.rj)return null;var ec=t==="org"?GRN:AMB;return(<div key={"Mb"+t} className="bblk"><div style={{display:"flex",gap:7,alignItems:"center",marginBottom:9}}><span style={{fontSize:15,fontWeight:900,color:"#e07070"}}>* Minibel</span><span className={"ttag "+t}>{t==="org"?"ORG":"CONV"}</span><span style={{fontSize:10,color:"#3a5c0a",marginLeft:"auto"}}>{fmt(c.rj,0)} rjs</span></div><div className="rrow"><Chip label="Bts 1a" v={fmt(c.bP,0)} col={ec}/><Chip label="Kg 1a" v={fk(c.kP)} col={ec}/><Chip label="Bts 2a" v={fmt(c.bS,0)} col="#e07070"/></div></div>);})}

            {show("Slicer")&&TIPOS.map(function(t){var c=ac.S[t];if(!c.rj)return null;return(<div key={"S"+t} className="bblk"><div style={{display:"flex",gap:7,alignItems:"center",marginBottom:9}}><span style={{fontSize:15,fontWeight:900,color:"#a8c840"}}>O Slicer</span><span className={"ttag "+t}>{t==="org"?"ORG":"CONV"}</span><span style={{fontSize:10,color:"#3a5c0a",marginLeft:"auto"}}>{fmt(c.rj,0)} rjs</span></div><div className="rrow"><Chip label="Pzs 1a" v={fmt(c.pzP,0)} col="#a8c840"/><Chip label="Kg 1a" v={fk(c.kgP)} col="#a8c840"/><Chip label="Pzs 2a" v={fmt(c.pzS,0)} col={AMB}/><Chip label="Kg 2a" v={fk(c.kgS)} col={AMB}/><Chip label="Pzs 3a" v={fmt(c.pzTer,0)} col="#6b7280"/></div></div>);})}

          </div>
        )}

        {tab==="comparativa"&&(
          <div>
            <div className="sec">Comparativa - {DIAS[di]}</div>
            {!recibo.length&&<div style={{background:"rgba(200,168,75,0.06)",border:"1px solid rgba(200,168,75,0.2)",borderRadius:9,padding:"11px 14px",marginBottom:12,fontSize:11,color:AMB}}>Ve a Campo y da "Jalar recibo de fruta" con la fecha del dia.</div>}
            {RANCHOS.map(function(rid){
              var rn=rid==="pvt"?"PVT":rid==="crp"?"Cordillera":"Forrajera";
              var rc=rid==="pvt"?"#fbbf24":rid==="crp"?"#60a5fa":"#4ade80";
              var rNoms=rid==="pvt"?["PVT"]:rid==="crp"?["CRP","Cordillera"]:["Forrajera","F4H"];
              var sg2=sg&&sg[sI+"_"+rid];
              var prods=RPRODS[rid]||[];
              var pOrg=0;var pConv=0;var aOrg=0;var aConv=0;

              var pT=pOrg+pConv; var aT=aOrg+aConv;
              var rOrg=0;var rConv=0;var tieneR=false;
              recibo.forEach(function(h){if(!h||!h.lotes)return;h.lotes.forEach(function(l){var rn2=(l.rancho||"").trim();if(!rNoms.some(function(n){return rn2.toLowerCase()===n.toLowerCase();}))return;tieneR=true;if(l.organico)rOrg+=(l.cajas||0);else rConv+=(l.cajas||0);});});
              var rT=rOrg+rConv;
              if(!pT&&!rT)return null;
              var dAR=aT-pT; var dRA=tieneR?rT-aT:null; var precR=aT>0&&tieneR?Math.round(rT/aT*100):null;
              return(<div key={rid} style={{background:"rgba(255,255,255,0.02)",border:"2px solid "+rc+"33",borderRadius:13,marginBottom:12,overflow:"hidden"}}>
                <div style={{background:rc+"15",padding:"9px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:14,fontWeight:900,color:rc}}>{rn}</span><span style={{fontSize:10,color:rc,opacity:0.7}}>{DIAS[di]}</span></div>
                <div style={{padding:"12px 14px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:12}}>
                    <div style={{background:"rgba(0,0,0,0.25)",borderRadius:9,padding:"10px",textAlign:"center",border:"1px solid rgba(200,168,75,0.2)"}}>
                      <div style={{fontSize:8,color:AMB,fontWeight:900,letterSpacing:1.5,marginBottom:5}}>PROYECTADO</div>
                      <div style={{fontSize:26,fontWeight:900,color:"#c8d870",fontFamily:"Georgia,serif"}}>{fmt(pT,0)}</div>
                      <div style={{fontSize:8,color:"#5a7a1a"}}>rejas</div>
                      <div style={{fontSize:9,color:"#5a7a1a",marginTop:2}}>Org {fmt(pOrg,0)} . Conv {fmt(pConv,0)}</div>
                    </div>
                    <div style={{background:"rgba(0,0,0,0.25)",borderRadius:9,padding:"10px",textAlign:"center",border:"1px solid "+(dAR!==0?"rgba(96,165,250,0.3)":"rgba(122,158,42,0.15)")}}>
                      <div style={{fontSize:8,color:dAR!==0?"#60a5fa":"#5a7a1a",fontWeight:900,letterSpacing:1.5,marginBottom:5}}>AJUSTE {dAR!==0?"*":""}</div>
                      <div style={{fontSize:26,fontWeight:900,color:dAR!==0?"#90caf9":"#c8d870",fontFamily:"Georgia,serif"}}>{fmt(aT,0)}</div>

                      {dAR!==0&&<div style={{fontSize:10,fontWeight:700,color:dAR>=0?"#4ade80":"#ef5350",marginTop:4}}>{dAR>=0?"+":""}{fmt(dAR,0)}</div>}
                    </div>
                    <div style={{background:"rgba(0,0,0,0.25)",borderRadius:9,padding:"10px",textAlign:"center",border:"1px solid "+(tieneR?"rgba(74,222,128,0.3)":"rgba(255,255,255,0.06)")}}>
                      <div style={{fontSize:8,color:tieneR?"#4ade80":"#5a7a1a",fontWeight:900,letterSpacing:1.5,marginBottom:5}}>CORTADO</div>
                      <div style={{fontSize:26,fontWeight:900,color:tieneR?"#4ade80":"rgba(255,255,255,0.2)",fontFamily:"Georgia,serif"}}>{tieneR?fmt(rT,0):"--"}</div>
                      <div style={{fontSize:8,color:"#5a7a1a"}}>rejas</div>
                      {tieneR&&<div style={{fontSize:9,color:"#5a7a1a",marginTop:2}}>Org {fmt(rOrg,0)} . Conv {fmt(rConv,0)}</div>}
                      {dRA!==null&&<div style={{fontSize:10,fontWeight:700,color:dRA>=0?"#4ade80":"#ef5350",marginTop:3}}>{dRA>=0?"+":""}{fmt(dRA,0)} vs ajuste</div>}
                    </div>
                  </div>
                  {precR!==null&&<div style={{background:precR>=90?"rgba(74,222,128,0.06)":precR>=75?"rgba(200,168,75,0.06)":"rgba(239,68,68,0.06)",border:"1px solid "+(precR>=90?"rgba(74,222,128,0.2)":precR>=75?"rgba(200,168,75,0.2)":"rgba(239,68,68,0.2)"),borderRadius:8,padding:"7px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:9,color:"#5a7a1a",fontWeight:900}}>PRECISION CORTADO vs AJUSTE</span>
                    <span style={{fontSize:18,fontWeight:900,color:precR>=90?"#4ade80":precR>=75?AMB:"#ef5350"}}>{precR}%</span>
                  </div>}
                </div>
              </div>);
            })}
          </div>
        )}
